name: Deploy to AWS Lambda

on:
  push:
    branches: [main]

jobs:
  deploy-receiver:
    name: Deploy Receiver Lambda
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ secrets.AWS_REGION }}

      - name: Zip receiver
        run: |
          zip receiver.zip receiver_lambda.py

      - name: Deploy receiver to Lambda
        run: |
          aws lambda update-function-code \
            --function-name claude-deploy-agent-receiver \
            --zip-file fileb://receiver.zip \
            --region $AWS_REGION

          # Receiver는 환경변수 2개만 필요
          aws lambda update-function-configuration \
            --function-name claude-deploy-agent-receiver \
            --region $AWS_REGION \
            --environment "Variables={ \
              SLACK_SIGNING_SECRET=${{ secrets.SLACK_SIGNING_SECRET }}, \
              WORKER_FUNCTION_NAME=claude-deploy-agent-worker \
            }"
